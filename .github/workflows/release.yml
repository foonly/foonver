name: foonver build

on:
  push:
    branches:
      - main
      - "push-action/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create tags and releases
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # foonver needs history to determine the next version

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.x

      - name: Run Tests
        run: make test

      - name: Verify Build
        # This ensures the code compiles before we commit any version bumps
        run: make build

      - name: Run foonver
        id: foonver
        uses: ./
        with:
          command: "auto"
          changelog: "true"
          push: "true"
          version_sync: "README.md"

      - name: Build Release Binary
        # Re-build now that the new tag exists, so the version is embedded correctly
        if: steps.foonver.outputs.is_bumped == 'true'
        run: make build

      - name: Create GitHub Release
        if: steps.foonver.outputs.is_bumped == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.foonver.outputs.version }}
          name: Release ${{ steps.foonver.outputs.version }}
          body: ${{ steps.foonver.outputs.release_notes }}
          draft: false
          prerelease: false
          files: "bin/foonver"

      - name: Update AUR PKGBUILD
        if: steps.foonver.outputs.is_bumped == 'true'
        run: ./aur/update-aur.sh ${{ steps.foonver.outputs.version }}

      - name: Publish to AUR
        if: steps.foonver.outputs.is_bumped == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: jman
          pkgbuild: aur/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to v${{ steps.foonver.outputs.version }}"
