name: "Run foonver"
description: "Automate SemVer bumping and changelog management"
inputs:
  version:
    description: "Version of foonver binary to download (e.g., v0.8.1)"
    required: false
    default: "latest"
  command:
    description: "foonver command to run (auto, patch, minor, major)"
    required: false
    default: "auto"
  changelog:
    description: "Whether to update CHANGELOG.md"
    required: false
    default: "true"
  push:
    description: "Whether to push the created commit and tag"
    required: false
    default: "false"
  remote:
    description: "Git remote to push to"
    required: false
    default: "origin"
  commit_message:
    description: "Custom commit message"
    required: false
    default: ""
  commit_suffix:
    description: "Suffix to append to the commit message (e.g., [skip ci])"
    required: false
    default: ""
  dry_run:
    description: "Run in dry-run mode (outputs version without making changes)"
    required: false
    default: "false"
  version_sync:
    description: "Comma-separated list of files to synchronize version in"
    required: false
  args:
    description: "Additional raw arguments for foonver"
    required: false

outputs:
  version:
    description: "The new version string"
    value: ${{ steps.run.outputs.version }}
  is_bumped:
    description: "Whether a version bump occurred"
    value: ${{ steps.run.outputs.is_bumped }}
  release_notes:
    description: "The generated release notes for the latest version"
    value: ${{ steps.run.outputs.release_notes }}

runs:
  using: "composite"
  steps:
    - name: Download foonver
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          URL="https://github.com/foonly/foonver/releases/latest/download/foonver"
        else
          URL="https://github.com/foonly/foonver/releases/download/${VERSION}/foonver"
        fi

        echo "Downloading foonver from $URL"
        curl -sSL -o /usr/local/bin/foonver "$URL"
        chmod +x /usr/local/bin/foonver

    - name: Run foonver
      id: run
      shell: bash
      run: |
        ARGS=()

        if [ "${{ inputs.changelog }}" == "true" ]; then
          ARGS+=("--changelog")
        fi

        if [ "${{ inputs.push }}" == "true" ]; then
          ARGS+=("--push")
        else
          ARGS+=("--no-push")
        fi

        if [ -n "${{ inputs.remote }}" ]; then
          ARGS+=("--remote" "${{ inputs.remote }}")
        fi

        if [ -n "${{ inputs.commit_message }}" ]; then
          ARGS+=("--commit-message" "${{ inputs.commit_message }}")
        fi

        if [ -n "${{ inputs.commit_suffix }}" ]; then
          ARGS+=("--commit-suffix" "${{ inputs.commit_suffix }}")
        fi

        if [ "${{ inputs.dry_run }}" == "true" ]; then
          ARGS+=("--dry-run")
        fi

        if [ -n "${{ inputs.version_sync }}" ]; then
          ARGS+=("--sync" "${{ inputs.version_sync }}")
        fi

        if [ -n "${{ inputs.args }}" ]; then
          # Split args by space, but this is a best-effort for raw args string
          read -ra EXTRA_ARGS <<< "${{ inputs.args }}"
          ARGS+=("${EXTRA_ARGS[@]}")
        fi

        # Ensure git identity is set for commits/tags
        if [ -z "$(git config user.name)" ]; then
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
        fi

        # Run foonver with --json to get structured output
        # We also use --release-notes to a temporary file to capture the delta
        TEMP_NOTES=$(mktemp)
        PLAN_JSON=$(foonver ${{ inputs.command }} "${ARGS[@]}" --json --release-notes "$TEMP_NOTES")
        FOONVER_EXIT_CODE=$?

        if [ $FOONVER_EXIT_CODE -ne 0 ]; then
          echo "Error: foonver failed with exit code $FOONVER_EXIT_CODE"
          exit $FOONVER_EXIT_CODE
        fi

        # Use jq to extract data from the plan
        NEW_VERSION=$(echo "$PLAN_JSON" | jq -r '.next_version')
        OLD_VERSION=$(echo "$PLAN_JSON" | jq -r '.current_version')

        IS_BUMPED="false"
        if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
          IS_BUMPED="true"
        fi

        # Set outputs
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "is_bumped=$IS_BUMPED" >> $GITHUB_OUTPUT

        # Capture release notes as a multiline output
        if [ -f "$TEMP_NOTES" ]; then
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          cat "$TEMP_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          rm "$TEMP_NOTES"
        fi
